<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala</title>
    <link rel="preload" href="./fonts/Montserrat/Montserrat-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="stylesheet" href="./fonts/font.css">
    <link rel="stylesheet" href="./src/twOutput.css">
    <link rel="shortcut icon" href="./english-janala-resources/assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header>
        <nav class="navbar bg-(--header-bg) bg-base-100 flex-between px-3.5 md:px-12 lg:px-20 py-3 my-2 md:my-4 shadow-sm">
          <div class="navbar-start">
            <div class="dropdown">
              <div tabindex="0" role="button" class="btn btn-ghost md:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
              </div>
              <ul
                tabindex = "-1"
                class = "menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow gap-4">
                <li><a href="" class="flex-between btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i><span>FAQ</span></a></li>
                <li><a href="" class="flex-between btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i><span>Learn</span></a></li>
                <li><a href="" class="flex-between btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Log in</span></a></li>
              </ul>
            </div>
            <a class="flex-center-y text-xl"><span class="">English</span><img src="./english-janala/assets/logo.png" alt=""><span>জানালা</span></a>
          </div>
          <div class="navbar-end hidden md:flex">
            <ul class="menu menu-horizontal px-1 flex-center-y gap-4">
              <li><a href="" class="flex-between btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i><span>FAQ</span></a></li>
              <li><a href="" class="flex-between btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i><span>Learn</span></a></li>
              <li><a href="" class="flex-between btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Log in</span></a></li>
            </ul>
          </div>
        </nav>
    </header>
    <main>
      <section class="flex-col-reverse text-center md:text-left md:flex-row flex-between px-18 gap-64">
        <div class = "content flex-1 my-auto flex-y gap-6">
          <h2 class="text-4xl font-bold"><span class="text-(--highlight-word)">English</span> is Easy!!</h2>
          <p class="font-bangla">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>
          <div>
            <div class="flex-y items-center md:items-start gap-4">
              <input type="text" placeholder="Enter Your Name" class="input input-bordered w-full max-w-xs text-xs px-3.5 py-2.5" />
              <input type="password" placeholder="Enter Password" class="input input-bordered w-full max-w-xs text-xs px-3.5 py-2.5" />
              <button class="btn btn-primary w-fit">Get Started</button>
            </div>
          </div>
        </div>
        <div class="image flex-1">
          <img src="./english-janala/assets/hero-student.png" alt="Happy student" class="">
        </div>
      </section>
      <!-- section.flex-y.>(h2.text-2.5rem.font-bold)+(div>ul.flex.flex-wrap>li.flex-between.btn.btn-outline.btn-primary>i.fa-solid.fa-book-open)+div.grid.grid-cols-1.md:grid-cols-2.lg:grid-cols-3>div.flex-y.my-auto>(div.flex-center-y.mx-auto>h2+short+p.font-bangla)+(div.flex-between.px-10.5) -->
      <section class="flex-center-col-y">
        <h2 class="text-2.5rem font-bold"><span class="text-(--highlight-word)">Let's</span> learn Vocabularies</h2>
        <div id="lesson" class="flex flex-wrap">
          <button class="flex-between btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i><span></span></button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
          <div class="flex-y my-auto">
            <div class="flex-center-y mx-auto">
              <h2></h2>
              <short></short>
              <p class="font-bangla"></p>
            </div>
            <div class="flex-between px-10.5"></div>
          </div>
        </div>
      </section>
    </main>
</body>
<script src="./src/app.js"></script>
</html>
